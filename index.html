<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#f3ecdb" />
<title>社会研究方法 · 互动刷题</title>
<style>
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:#f3ecdb}
.srm-root{
  --paper:#f3ecdb; --paper2:#ece2cd; --card:#fdfaf2; --card2:#f7f0e1;
  --ink:#1f2e3b; --ink-soft:#566472; --muted:#8a7f6b;
  --line:#ddd0b6; --line2:#cbbd9d;
  --accent:#a86a12; --accent2:#c8961f; --accent-bg:#efe1bf;
  --ok:#2f6b4f; --ok-bg:#dcebe1; --bad:#a8472f; --bad-bg:#f2ddd3;
  --shadow:0 8px 30px rgba(31,46,59,.10);
  --serif:'Songti SC','STSong','SimSun',Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Hiragino Sans GB','Noto Sans SC',sans-serif;
  font-family:var(--sans); color:var(--ink); min-height:100vh;
  background:
    radial-gradient(900px 500px at 88% -8%, rgba(200,150,31,.14), transparent 60%),
    radial-gradient(700px 500px at -6% 108%, rgba(47,107,79,.10), transparent 55%),
    linear-gradient(180deg,var(--paper),var(--paper2));
  padding:26px 16px 40px;
}
.srm-wrap{max-width:760px;margin:0 auto}
.ic{display:inline-block;vertical-align:middle;flex:none}
.srm-head{margin-bottom:22px}
.srm-kicker{display:inline-flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.srm-title{font-family:var(--serif);font-weight:700;font-size:33px;line-height:1.14;margin:9px 0 5px;letter-spacing:.01em}
.srm-sub{color:var(--ink-soft);font-size:14.5px;line-height:1.6}
.srm-rule{height:0;border:none;border-top:1.5px solid var(--line2);margin:16px 0 0;position:relative}
.srm-rule:after{content:"";position:absolute;left:0;right:0;top:3px;border-top:1px solid var(--line)}
.srm-grid{display:grid;grid-template-columns:1fr;gap:13px;margin-top:22px}
@media(min-width:560px){.srm-grid{grid-template-columns:1fr 1fr}}
.srm-mc{position:relative;text-align:left;cursor:pointer;border:1px solid var(--line);background:linear-gradient(180deg,var(--card),var(--card2));border-radius:16px;padding:18px 18px 16px;box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;opacity:0;animation:rise .5s ease forwards;overflow:hidden;width:100%;font-family:inherit}
.srm-mc:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent2),var(--accent))}
.srm-mc:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(31,46,59,.15);border-color:var(--line2)}
.srm-mc-ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:var(--accent-bg);color:var(--accent);margin-bottom:12px}
.srm-mc-t{font-family:var(--serif);font-weight:700;font-size:19px;margin-bottom:5px}
.srm-mc-d{color:var(--ink-soft);font-size:13.5px;line-height:1.55;min-height:42px}
.srm-mc-m{margin-top:12px;display:flex;align-items:center;justify-content:space-between;border-top:1px dashed var(--line);padding-top:10px;font-size:12.5px;color:var(--muted)}
.srm-mc-m b{font-family:var(--serif);color:var(--accent);font-weight:700}
.srm-arrow{color:var(--accent);display:inline-flex;transition:transform .18s ease}
.srm-mc:hover .srm-arrow{transform:translateX(4px)}
.srm-panel{border:1px solid var(--line);background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:20px;margin-top:14px}
.srm-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.srm-back{display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:500;transition:background .15s ease,border-color .15s;font-family:inherit}
.srm-back:hover{background:var(--card2);border-color:var(--line2)}
.srm-mode-name{font-family:var(--serif);font-weight:700;font-size:16px}
.srm-count{margin-left:auto;font-family:var(--serif);font-size:14px;color:var(--accent);font-weight:700}
.srm-prog{height:8px;border-radius:999px;background:var(--paper2);overflow:hidden;border:1px solid var(--line)}
.srm-prog>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .45s cubic-bezier(.2,.7,.2,1)}
.srm-stage{perspective:1600px;margin:6px 0 4px}
.srm-flip{position:relative;width:100%;min-height:300px;transition:transform .6s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d;cursor:pointer}
.srm-flip.on{transform:rotateY(180deg)}
.srm-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);padding:30px 26px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);overflow:auto}
.srm-front{background:linear-gradient(165deg,#fffdf6,#f5ecd6);align-items:center;text-align:center}
.srm-back{background:linear-gradient(165deg,#fbf9f1,#f3ead7);transform:rotateY(180deg);text-align:left}
.srm-tag{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
.srm-term{font-family:var(--serif);font-weight:700;font-size:26px;line-height:1.32}
.srm-hint{margin-top:18px;font-size:12.5px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;justify-content:center}
.srm-def-h{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px}
.srm-def{font-size:16px;line-height:1.78}
.srm-row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.srm-btn{cursor:pointer;border-radius:12px;padding:13px 14px;font-size:14.5px;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:transform .12s ease,filter .15s,background .15s;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit}
.srm-btn:active{transform:scale(.98)}
.srm-btn.ok{background:var(--ok-bg);border-color:#bcd9c6;color:var(--ok)}
.srm-btn.bad{background:var(--bad-bg);border-color:#e6c2b4;color:var(--bad)}
.srm-btn.solid{background:var(--ink);border-color:var(--ink);color:#fbf5e6}
.srm-btn.solid:hover{filter:brightness(1.12)}
.srm-btn.block{width:100%}
.srm-btn.ghost{background:var(--card2)}
.srm-q{font-family:var(--serif);font-weight:600;font-size:19px;line-height:1.5;margin:6px 0 16px}
.srm-pill{display:inline-block;font-size:11.5px;letter-spacing:.1em;color:var(--accent);background:var(--accent-bg);border-radius:999px;padding:3px 11px;font-weight:600;margin-bottom:10px}
.srm-opts{display:flex;flex-direction:column;gap:10px}
.srm-opt{text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:13px 15px;font-size:15px;line-height:1.5;color:var(--ink);transition:background .15s,border-color .15s,transform .12s;display:flex;align-items:center;gap:11px;font-family:inherit;width:100%}
.srm-opt:hover:not(:disabled){border-color:var(--accent);background:#fffdf5}
.srm-opt:disabled{cursor:default}
.srm-opt .k{flex:none;width:25px;height:25px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700;font-family:var(--serif);background:var(--paper2);color:var(--ink-soft);border:1px solid var(--line)}
.srm-opt.correct{background:var(--ok-bg);border-color:#9ecbac;animation:pop .35s ease}
.srm-opt.correct .k{background:var(--ok);color:#fff;border-color:var(--ok)}
.srm-opt.wrong{background:var(--bad-bg);border-color:#e0a994;animation:shake .35s ease}
.srm-opt.wrong .k{background:var(--bad);color:#fff;border-color:var(--bad)}
.srm-opt .mark{margin-left:auto;display:inline-flex}
.srm-explain{margin-top:14px;border-left:4px solid var(--accent2);background:var(--card2);border-radius:0 10px 10px 0;padding:12px 15px;font-size:14px;line-height:1.65;color:var(--ink-soft);animation:fade .3s ease}
.srm-explain b{color:var(--accent)}
.srm-ta{width:100%;min-height:108px;resize:vertical;border:1px solid var(--line);border-radius:12px;background:#fffdf6;padding:13px 14px;font-size:14.5px;line-height:1.7;color:var(--ink);font-family:inherit;outline:none}
.srm-ta:focus{border-color:var(--accent)}
.srm-points{margin-top:14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);padding:14px 16px;animation:fade .3s ease}
.srm-points h5{margin:0 0 10px;font-family:var(--serif);font-size:14px;color:var(--accent);letter-spacing:.04em;font-weight:700}
.srm-points ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:9px}
.srm-points li{position:relative;padding-left:22px;font-size:14.5px;line-height:1.65}
.srm-points li:before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--accent2);transform:rotate(45deg)}
.srm-prompt{font-size:15.5px;line-height:1.8;background:var(--card2);border-radius:12px;padding:15px 16px;border:1px solid var(--line);margin-bottom:16px}
.srm-inrow{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap}
.srm-num{flex:1;min-width:150px;border:1px solid var(--line2);border-radius:12px;background:#fffdf6;padding:13px 15px;font-size:18px;font-family:var(--serif);color:var(--ink);outline:none}
.srm-num:focus{border-color:var(--accent)}
.srm-unit{align-self:center;color:var(--muted);font-size:14px}
.srm-feedback{margin-top:14px;border-radius:12px;padding:13px 15px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:9px;animation:fade .3s ease}
.srm-feedback.good{background:var(--ok-bg);color:var(--ok);border:1px solid #9ecbac}
.srm-feedback.no{background:var(--bad-bg);color:var(--bad);border:1px solid #e0a994}
.srm-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px;animation:fade .3s ease}
.srm-table th,.srm-table td{border:1px solid var(--line);padding:8px 10px;text-align:center}
.srm-table th{background:#e9ddc2;font-family:var(--serif);font-weight:700}
.srm-table td{background:#fffdf6}
.srm-table tr:last-child td{background:var(--accent-bg);font-weight:700;font-family:var(--serif)}
.srm-ans{margin-top:12px;font-family:var(--serif);font-size:16px;font-weight:700;background:var(--card2);border-radius:10px;padding:11px 14px;border-left:4px solid var(--accent)}
.srm-note{margin-top:10px;font-size:12.5px;line-height:1.6;color:var(--muted)}
.srm-result{text-align:center;padding:14px 6px}
.srm-score{font-family:var(--serif);font-weight:700;font-size:54px;line-height:1;color:var(--accent);margin:6px 0}
.srm-score small{font-size:24px;color:var(--ink-soft);font-weight:500}
.srm-result-msg{font-size:15px;color:var(--ink-soft);margin:8px 0 18px;line-height:1.6}
.srm-result-row{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}
.srm-foot{text-align:center;margin-top:26px;font-size:12px;color:var(--muted);line-height:1.7}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.99)}55%{transform:scale(1.012)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}22%{transform:translateX(-5px)}55%{transform:translateX(5px)}78%{transform:translateX(-3px)}}
</style>
</head>
<body>
<div class="srm-root"><div class="srm-wrap"><div id="app"></div></div></div>
<script>
/* ====== 复习内容（取自复习笔记） ====== */
var FLASHCARDS=[
["实证主义方法论","主张凡能经验证实、可直接观察的才是科学的；像自然科学家那样观察、测量社会现象并建立因果关系，坚持“价值中立”。对应定量研究。代表：孔德、涂尔干《自杀论》。"],
["人文主义方法论","认为社会现象由有意识、有情感、行动带意义的人产生，须结合人的信念与价值观去理解，承认研究的主观性。对应定性研究。代表：韦伯（理解主义）《新教伦理与资本主义精神》。"],
["分析单位","研究者进行调查、抽样，并最终用以描述或解释社会现象的基本社会单位。五类：个人、群体、社会组织、社区、社会产物。"],
["区群谬误（生态谬误 / 层次谬误）","一种“以全概偏”的错误——仅凭群体层次的统计数据，就对其下属个体的性质作出推论，错误地假设群体中所有个体都具有群体的性质。"],
["简化论（还原论）","与区群谬误方向相反，是“以偏概全”——用较低层次（个体）的资料去解释较高层次（宏观）才能得出的结论；或局限于用某一类特征解释复杂社会现象（如心理简化论）。"],
["操作化","把抽象的概念逐步转化为可观察、可测量的具体指标的过程。逻辑链：概念 → 变量 → 指标。它是沟通抽象理论与具体经验事实之间的桥梁。"],
["变量","具有一个以上取值的概念，标识现象在类别、数量等方面的变异，须满足穷尽性与互斥性。分为自变量、因变量、中间变量。"],
["研究假设（理论假设）","在调查之前，对研究对象的特征与有关现象之间关系作出的、有待经验检验的尝试性判断。"],
["抽样框","依据总体范围，收集全部抽样单位的名单并统一编号后，供抽样使用的名单。"],
["分层抽样","先按某特征（性别、职业、学科等）把总体分成若干层，再在各层内用随机或系统抽样抽取子样本，合成总样本。适用于组内差异小、组间差异大。"],
["整群抽样","先把总体分成若干小群，随机抽取若干群，并取被抽中群内的全部元素构成样本。抽样单位是“群”。适用于组内差异大、组间差异小。"],
["文献综述","围绕研究问题，对既有相关文献进行系统梳理、分类、比较与批判性评价的工作。用以厘清贡献、搭建框架、避免重复。"],
["开放式编码","三级编码第一步。把原始资料分解、提炼并标签化，提取初步概念；特点是创造性、灵活性，此时可较粗、较多、较杂乱。"],
["轴心式编码","三级编码第二步。在开放编码之间建立逻辑关系（因果条件—现象—策略—结果），形成类别；特点是关联性、聚合性。"],
["选择式编码","三级编码第三步。整合所有类别，选定一个核心现象、用故事线串联其他类别，提炼核心范畴与理论；特点是对比性、深入性。"],
["概念","对现象的一种抽象，是一类事物的属性（共同特征）在人们头脑中的主观反映；是建构理论的“砖石”。"],
["机制","描述要素之间如何咬合运作的“动态过程”。区别：机理＝深挖根本原因/动力；路径＝刻画阶段与顺序；逻辑＝行为背后的价值与理由。"],
["内容分析","对各种文献/传播内容进行客观、系统、定量分析的方法，核心是把定性的文字资料按预定类目转换为可统计的数据，再做描述性统计。"],
["集中趋势","从一组数据中抽象出一个代表值，用以代表现象的共性和一般水平。常用指标：众数、中位数、平均数。"],
["离散趋势","用一个数值反映一组数据相互之间的离散（分散）程度。常用指标：异众比率、极差、四分位差、方差（标准差）。"],
["组中值","一个分组的代表值，等于（组下限＋组上限）÷2，用于由分组频数计算加权平均数。"],
["信度 / 效度","信度＝测量结果的一致性与稳定性（可重复性）；效度＝测量的有效性，即是否真正测到了想测的概念。"]
];
var MCQS=[
["社会研究方法的知识体系自上而下的三个层次是？",["研究技术 → 研究方式 → 方法论","方法论 → 研究方式 → 研究技术","方法论 → 研究技术 → 研究方式","研究方式 → 方法论 → 研究技术"],1,"高层是方法论，中层是研究方式，低层是研究技术。"],
["哪种方法论对应定量研究，主张“价值中立”，像自然科学一样观察测量？",["人文主义方法论","实证主义方法论","批判主义方法论","建构主义方法论"],1,"实证主义（孔德、涂尔干），从可观察事实出发、建立因果关系，对应定量研究。"],
["韦伯的“理解主义”研究方法属于：",["实证主义，对应定量研究","人文主义，对应定性研究","实证主义，对应定性研究","人文主义，对应定量研究"],1,"人文主义强调理解人的行为意义，承认主观性，对应定性研究。"],
["社会研究的四种研究方式是：",["调查研究、实验研究、实地研究、文献研究","定量、定性、混合、案例研究","探索性、描述性、解释性、预测性研究","问卷、访谈、观察、统计"],0,"四种“方式”；探索/描述/解释是研究“类型”；问卷、访谈等是“技术”。"],
["“某城市居民平均智商高于另一城市，便断定随机各抽一人前者一定更高”，属于：",["简化论","区群谬误（生态谬误）","抽样误差","测量误差"],1,"用群体平均去推断个体性质，“以全概偏”，是区群谬误。"],
["用个体层次（如个人心理）资料去解释宏观层次的社会现象，所犯错误是：",["区群谬误","简化论（还原论）","操作化错误","以全概偏"],1,"“以偏概全”、用低层次解释高层次＝简化论；与区群谬误方向相反。"],
["操作化的正确逻辑顺序是：",["指标 → 变量 → 概念","概念 → 指标 → 变量","概念 → 变量 → 指标","变量 → 概念 → 指标"],2,"从抽象到具体：概念 → 变量 → 指标。"],
["问卷答案要求“任何被调查者都能找到符合自己的一项”，这是指答案的：",["互斥性","穷尽性","信度","效度"],1,"穷尽性＝覆盖所有可能情况；互斥性＝答案之间不重叠、不包含。"],
["测量层次中，既有相等间距、又有“绝对零点”、可做乘除运算的是：",["定类测量","定序测量","定距测量","定比测量"],3,"定比有绝对零点（如收入、年龄）；定距无绝对零点（如温度）。"],
["“学历分为：小学、中学、大学、研究生”属于哪种测量层次？",["定类","定序","定距","定比"],1,"能排序但间距不等，属于定序测量。"],

      '<div class="srm-result-row">'+

      '<button class="srm-btn ghost" onclick="flashRestart(false)">'+ic('refresh',16)+' 重新开始</button>'+

    '<div class="srm-term">'+esc(term)+'</div>'+
    '<span class="srm-hint">'+ic('eye',14)+' 点击卡片查看释义</span></div>'+
    '<div class="srm-face srm-back"><div class="srm-def-h">'+esc(term)+'</div>'+
    '<div class="srm-def">'+esc(def)+'</div></div></div></div>'+

function flashFlip(){state.flash.flip=!state.flash.flip;var el=document.querySelector('.srm-flip');if(el)el.classList.toggle('on',state.flash.flip);}
function flashMark(s){var f=state.flash;f.res[f.deck[f.ptr]]=s;f.flip=false;f.ptr++;render();}
function flashRestart(only){
  var f=state.flash;
  if(only){
    var deck=[],kept={};
    for(var k in f.res){if(f.res[k]==='review')deck.push(Number(k));else kept[k]=f.res[k];}
    f.res=kept;f.deck=deck.length?deck:FLASHCARDS.map(function(_,i){return i;});
  }else{f.res={};f.deck=FLASHCARDS.map(function(_,i){return i;});}
  f.ptr=0;f.flip=false;render();
}

/* 选择题 */
function mcqHTML(){
  var m=state.mcq;
  if(m.idx>=MCQDECK.length){
    var pct=Math.round(m.score/MCQDECK.length*100);
    var msg=pct>=90?'几乎全对，概念掌握得很扎实！':pct>=70?'基础不错，错题再回看一下解析。':'把错的概念对照笔记重点过一遍，会进步很快。';
    return bar('概念自测 · 选择题')+
      '<div class="srm-panel"><div class="srm-result"><span class="srm-pill">测试完成</span>'+
      '<div class="srm-score">'+m.score+'<small> / '+MCQDECK.length+'</small></div>'+
      '<p class="srm-result-msg">正确率 '+pct+'%。'+msg+'</p>'+
      '<div class="srm-result-row"><button class="srm-btn solid" onclick="mcqRestart()">'+ic('refresh',16)+' 再测一次</button>'+
      '<button class="srm-btn" onclick="go(\'home\')">返回首页</button></div></div></div>';
  }
  var cur=MCQDECK[m.idx],answered=m.sel!==null,letters="ABCD";
  var opts=cur.opts.map(function(o,i){
    var cls='srm-opt';
    if(answered&&i===cur.ci)cls+=' correct';else if(answered&&i===m.sel)cls+=' wrong';
    var mark='';
    if(answered&&i===cur.ci)mark='<span class="mark" style="color:var(--ok)">'+ic('check',18)+'</span>';
    else if(answered&&i===m.sel)mark='<span class="mark" style="color:var(--bad)">'+ic('x',18)+'</span>';
    return '<button class="'+cls+'"'+(answered?' disabled':'')+' onclick="mcqChoose('+i+')">'+
      '<span class="k">'+letters[i]+'</span><span>'+esc(o)+'</span>'+mark+'</button>';
  }).join('');
  var tail='';
  if(answered){
    var head=m.sel===cur.ci?'答对了 ✓':'正确答案：'+letters[cur.ci];
    tail='<div class="srm-explain"><b>'+head+'</b>　'+esc(cur.ex)+'</div>'+
      '<button class="srm-btn solid block" style="margin-top:14px" onclick="mcqNext()">'+
      (m.idx===MCQDECK.length-1?'查看成绩':'下一题')+' '+ic('next',16)+'</button>';
  }
  return bar('概念自测 · 选择题',(m.idx+1)+' / '+MCQDECK.length+' · 得分 '+m.score)+
    '<div class="srm-prog" style="margin-bottom:16px"><i style="width:'+(m.idx/MCQDECK.length*100)+'%"></i></div>'+
    '<div class="srm-panel"><div class="srm-q">'+esc(cur.q)+'</div>'+
    '<div class="srm-opts">'+opts+'</div>'+tail+'</div>';
}
function mcqChoose(i){var m=state.mcq;if(m.sel!==null)return;m.sel=i;m.done++;if(i===MCQDECK[m.idx].ci)m.score++;render();}
function mcqNext(){state.mcq.sel=null;state.mcq.idx++;render();}
function mcqRestart(){state.mcq={idx:0,sel:null,score:0,done:0};render();}

/* 简答 / 论述 */
function shortHTML(){
  var s=state.short;
  if(s.idx>=SHORT_QS.length){
    var good=0;for(var k in s.stat){if(s.stat[k]==='ok')good++;}
    return bar('简答 & 论述 · 要点自查')+
      '<div class="srm-panel"><div class="srm-result"><span class="srm-pill">自查完成</span>'+
      '<div class="srm-score">'+good+'<small> / '+SHORT_QS.length+'</small></div>'+
      '<p class="srm-result-msg">自评“掌握了” '+good+' 道。论述题记得：要展开、要结合自己的研究案例。</p>'+
      '<div class="srm-result-row"><button class="srm-btn solid" onclick="shortRestart()">'+ic('refresh',16)+' 重新自查</button>'+
      '<button class="srm-btn" onclick="go(\'home\')">返回首页</button></div></div></div>';
  }
  var q=SHORT_QS[s.idx],type=q[0],qt=q[1],pts=q[2];
  var body;
  if(!s.show){
    body='<button class="srm-btn solid block" style="margin-top:14px" onclick="shortReveal()">'+ic('eye',16)+' 查看参考要点</button>';
  }else{
    var li=pts.map(function(p){return '<li>'+esc(p)+'</li>';}).join('');
    body='<div class="srm-points"><h5>参考答题要点</h5><ul>'+li+'</ul></div>'+
      '<div class="srm-row2" style="margin-top:14px"><button class="srm-btn bad" onclick="shortGrade(\'review\')">'+ic('refresh',16)+' 再看看</button>'+
      '<button class="srm-btn ok" onclick="shortGrade(\'ok\')">'+ic('check',16)+' 掌握了</button></div>';
  }
  return bar('简答 & 论述 · 要点自查',(s.idx+1)+' / '+SHORT_QS.length)+
    '<div class="srm-prog" style="margin-bottom:16px"><i style="width:'+(s.idx/SHORT_QS.length*100)+'%"></i></div>'+
    '<div class="srm-panel"><span class="srm-pill">'+esc(type)+'题</span>'+
    '<div class="srm-q">'+esc(qt)+'</div>'+
    '<textarea class="srm-ta" placeholder="先在这里默写你的答题要点（不计分，仅供对照）…" oninput="shortInput('+s.idx+',this.value)">'+esc(s.text[s.idx]||'')+'</textarea>'+
    body+'</div>';
}
function shortReveal(){state.short.show=true;render();}
function shortInput(idx,val){state.short.text[idx]=val;}
function shortGrade(st){state.short.stat[state.short.idx]=st;state.short.show=false;state.short.idx++;render();}
function shortRestart(){state.short={idx:0,show:false,stat:{},text:{}};render();}

/* 计算题 */
function calcHTML(){
  var c=state.calc,q=CALC_QS[c.idx];
  var fb='';
  if(c.st==='good')fb='<div class="srm-feedback good">'+ic('spark',18)+' 正确！算法掌握得很好。</div>';
  else if(c.st==='no')fb='<div class="srm-feedback no">'+ic('x',18)+' 还不对，再算算，或直接看解题步骤。</div>'+
    '<button class="srm-btn ghost block" style="margin-top:12px" onclick="calcReveal()">'+ic('eye',16)+' 查看解题步骤</button>';
  var sol='';
  if(c.st==='good'||c.st==='reveal'){
    var body=q.rows.map(function(r){return '<tr>'+r.map(function(x){return '<td>'+esc(x)+'</td>';}).join('')+'</tr>';}).join('');
    sol='<table class="srm-table"><thead><tr><th>组别</th><th>人数</th><th>组中值</th><th>组中频次</th></tr></thead><tbody>'+body+'</tbody></table>'+
      '<div class="srm-ans">'+esc(q.answer)+'</div><div class="srm-note">'+esc(q.note)+'</div>';
  }
  var nav='<div class="srm-row2" style="margin-top:16px">'+
    (c.idx>0?'<button class="srm-btn ghost" onclick="calcGo('+(c.idx-1)+')">'+ic('back',16)+' 上一题</button>':'<button class="srm-btn ghost" onclick="go(\'home\')">'+ic('back',16)+' 返回首页</button>')+
    (c.idx<CALC_QS.length-1?'<button class="srm-btn solid" onclick="calcGo('+(c.idx+1)+')">下一题 '+ic('next',16)+'</button>':'<button class="srm-btn solid" onclick="go(\'home\')">完成 '+ic('check',16)+'</button>')+
    '</div>';
  return bar('计算题 · 实战',(c.idx+1)+' / '+CALC_QS.length)+
    '<div class="srm-panel"><span class="srm-pill">计算 · '+esc(q.title)+'</span>'+
    '<div class="srm-q" style="font-size:17px;margin-bottom:12px">求平均值（'+esc(q.unit)+'）</div>'+
    '<div class="srm-prompt">'+esc(q.prompt)+'</div>'+
    '<div class="srm-inrow"><input class="srm-num" inputmode="decimal" placeholder="输入你的答案" value="'+esc(c.val)+'" oninput="state.calc.val=this.value" onkeydown="if(event.key===\'Enter\')calcCheck()" />'+
    '<span class="srm-unit">'+esc(q.unit)+'</span>'+
    '<button class="srm-btn solid" onclick="calcCheck()">'+ic('check',16)+' 验证</button></div>'+
    fb+sol+nav+'</div>'+
    '<p class="srm-foot">提示：组中值 =（下限＋上限）÷2　·　加权平均 = Σ(组中值×人数) ÷ 总人数</p>';
}
function calcCheck(){var c=state.calc,q=CALC_QS[c.idx],v=parseFloat(c.val);if(isNaN(v))return;var ok=q.accept.some(function(a){return Math.abs(v-a)<0.2;});c.st=ok?'good':'no';render();}
function calcReveal(){state.calc.st='reveal';render();}
function calcGo(i){state.calc.idx=i;state.calc.val='';state.calc.st=null;render();}

/* ====== 主渲染 ====== */
function render(){
  var app=document.getElementById('app');
  if(state.view==='home')app.innerHTML=homeHTML();
  else if(state.view==='flash')app.innerHTML=flashHTML();
  else if(state.view==='mcq')app.innerHTML=mcqHTML();
  else if(state.view==='short')app.innerHTML=shortHTML();
  else if(state.view==='calc')app.innerHTML=calcHTML();
}
render();
</script>
</body>
</html>
